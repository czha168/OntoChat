# OntoChat LLM Provider Configuration Sample
# Copy this file to config.toml and customize for your environment

# -----------------------------------------------------------------------------
# Provider Configuration
# -----------------------------------------------------------------------------

[provider]
# Supported providers: "openai", "ollama", "vllm", "groq", "mistral", "custom"
name = "openai"

# API key (use environment variable or hardcode for local development)
# For OpenAI, use ${OPENAI_API_KEY}
# For other providers, use their respective env vars
api_key = "${OPENAI_API_KEY}"

# Base URL (optional)
# - OpenAI: leave as commented to use default
# - Ollama: http://localhost:11434
# - vLLM: http://localhost:8000
# - Groq: https://api.groq.com/openai/v1
#base_url = "https://api.openai.com/v1"

# Default model for chat completions
default_model = "gpt-4o"

# -----------------------------------------------------------------------------
# Generation Parameters
# -----------------------------------------------------------------------------
[generation]
# Temperature for sampling (0 = deterministic, 1 = creative)
temperature = 0.0

# Random seed for reproducibility
seed = 1234

